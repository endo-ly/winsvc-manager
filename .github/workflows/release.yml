name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore winsvc-manager.sln

      - name: Build
        run: dotnet build winsvc-manager.sln --configuration Release --no-restore -m:1

      - name: Test
        run: dotnet test winsvc-manager.sln --configuration Release --no-build -m:1

      - name: Bootstrap release tools
        shell: pwsh
        run: ./scripts/bootstrap.ps1

      - name: Publish CLI package
        shell: pwsh
        run: >
          ./scripts/publish-release.ps1
          -Runtime "${{ matrix.runtime }}"
          -Version "${{ github.ref_name }}"
          -OutputRoot "${{ github.workspace }}\artifacts"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: winsvc-${{ matrix.runtime }}
          path: |
            artifacts/winsvc-*.zip
            artifacts/winsvc-*.zip.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/winsvc-*.zip
            artifacts/winsvc-*.zip.sha256
