id: acestep
displayName: ACE-Step API
description: ACE-Step FastAPI service

runtime:
  workDir: C:\svc\runtimes\acestep\ACE-Step-1.5
  executable: C:\svc\runtimes\acestep\ACE-Step-1.5\.venv\Scripts\python.exe
  arguments:
    - -m
    - acestep.api_server

service:
  wrapperDir: C:\svc\services\acestep
  startMode: delayed-auto
  onFailure: restart
  resetFailure: 1 hour

env:
  ACESTEP_API_HOST: 127.0.0.1
  ACESTEP_API_PORT: "8010"
  ACESTEP_API_KEY: "<set-later>"
  ACESTEP_DEVICE: auto

health:
  url: http://127.0.0.1:8010/health
  timeoutSec: 5
